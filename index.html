<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claws by Kait</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/site.css" />
  <style>
    /* HOME-SPECIFIC */
    .hero {
      position: relative;
      z-index: 1;
      min-height: 92vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 4rem 2rem;
      overflow: hidden;
    }

    .hero-eyebrow {
      font-size: 0.72rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--rose);
      margin-bottom: 1.5rem;
    }

    .hero-title {
      font-family: 'UnifrakturMaguntia', serif;
      font-size: clamp(4rem, 12vw, 9rem);
      line-height: 0.9;
      color: var(--bone);
      margin-bottom: 0.5rem;
    }

    .hero-sub {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: clamp(1rem, 2.5vw, 1.4rem);
      color: var(--bone-dim);
      margin-bottom: 3rem;
    }

    .hero-divider {
      width: 1px;
      height: 60px;
      background: linear-gradient(to bottom, transparent, var(--rose), transparent);
      margin: 0 auto 3rem;
    }

    .hero-actions { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; }

    .hero-drip {
      position: absolute;
      bottom: -2px;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 800px;
      opacity: 0.12;
      pointer-events: none;
    }

    /* GALLERY */
    #gallery {
      position: relative;
      z-index: 1;
      padding: 5rem 3rem;
      background: var(--off-black);
      border-top: 0.5px solid rgba(232,227,218,0.07);
    }

    .gallery-header { text-align: center; margin-bottom: 3rem; }

    .gallery-header h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 300;
      color: var(--bone);
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 3px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .gallery-item {
      aspect-ratio: 1;
      overflow: hidden;
      background: var(--ink);
      position: relative;
    }

    .gallery-item img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
      transition: transform 0.5s ease, filter 0.5s ease;
      filter: saturate(0.85);
    }

    .gallery-item:hover img { transform: scale(1.05); filter: saturate(1); }

    .gallery-item .overlay {
      position: absolute; inset: 0;
      background: rgba(10,10,10,0);
      transition: background 0.3s;
    }
    .gallery-item:hover .overlay { background: rgba(10,10,10,0.12); }

    .gallery-empty {
      grid-column: 1/-1;
      text-align: center;
      padding: 6rem 2rem;
      color: var(--silver);
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 1.3rem;
    }

    @media (max-width: 640px) {
      #gallery { padding: 4rem 1.5rem; }
      .gallery-grid { grid-template-columns: repeat(2, 1fr); gap: 2px; }
    }
  </style>
</head>
<body>

  <header>
    <a href="index.html" class="site-name">Claws by Kait</a>
    <nav>
      <a href="index.html" class="active">Home</a>
      <a href="services.html">Services</a>
      <a href="book.html">Book</a>
      <a href="policies.html">Policies</a>
      <a href="connect.html">Connect</a>
    </nav>
  </header>

  <section class="hero">
    <p class="hero-eyebrow">Sacramento, CA &nbsp;✦&nbsp; Nail Artist</p>
    <h1 class="hero-title">Claws<br>by Kait</h1>
    <p class="hero-sub">Wearable art for the bold, the dark, the divine.</p>
    <div class="hero-divider"></div>
    <div class="hero-actions">
      <a href="book.html" class="btn">Book an Appointment</a>
      <a href="services.html" class="btn btn-ghost">View Services</a>
    </div>

    <svg class="hero-drip" viewBox="0 0 800 80" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M0 0 Q100 40 200 10 Q300 -10 400 30 Q500 60 600 20 Q700 -10 800 20 L800 80 L0 80 Z" fill="#e8e3da"/>
      <circle cx="180" cy="50" r="4" fill="#e8e3da"/>
      <circle cx="182" cy="62" r="2.5" fill="#e8e3da"/>
      <circle cx="183" cy="70" r="1.5" fill="#e8e3da"/>
      <circle cx="450" cy="55" r="3" fill="#e8e3da"/>
      <circle cx="451" cy="65" r="2" fill="#e8e3da"/>
      <circle cx="620" cy="40" r="3.5" fill="#e8e3da"/>
      <circle cx="621" cy="52" r="2" fill="#e8e3da"/>
    </svg>
  </section>

  <section id="gallery">
    <div class="gallery-header fade-in">
      <p class="section-label">The Work</p>
      <h2>Gallery</h2>
    </div>
    <div class="gallery-grid" id="gallery-grid">
      <div class="gallery-empty">✦ &nbsp; Gallery loading… &nbsp; ✦</div>
    </div>
  </section>

  <footer>
    <span>© 2026 Claws by Kait &nbsp;·&nbsp; Sacramento, CA</span>
    <a href="admin/index.html">✦</a>
  </footer>

  <script type="module">
    import { initializeApp }    from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js';
    import { getFirestore, collection, getDocs, orderBy, query }
                                from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js';
    import { FIREBASE_CONFIG }  from './firebase-config.js';

    const observer = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
    }, { threshold: 0.1 });
    document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));

    const app = initializeApp(FIREBASE_CONFIG);
    const db  = getFirestore(app);

    async function loadGallery() {
      const grid = document.getElementById('gallery-grid');
      try {
        const q    = query(collection(db, 'gallery'), orderBy('uploadedAt', 'desc'));
        const snap = await getDocs(q);
        if (snap.empty) {
          grid.innerHTML = '<div class="gallery-empty">✦ &nbsp; Coming soon — check back soon. &nbsp; ✦</div>';
          return;
        }
        grid.innerHTML = snap.docs.map(doc => {
          const { url, caption } = doc.data();
          return `<div class="gallery-item fade-in">
            <img src="${url}" alt="${caption || 'Nail art by Kait'}" loading="lazy" />
            <div class="overlay"></div>
          </div>`;
        }).join('');
        document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));
      } catch (err) {
        grid.innerHTML = '<div class="gallery-empty">✦ &nbsp; Gallery unavailable — check back soon. &nbsp; ✦</div>';
      }
    }
    loadGallery();
  </script>
</body>
</html>
