<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claws by Kait</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manufacturing+Consent:wght@400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/site.css" />
  <style>
    .hero {
      position: relative;
      z-index: 1;
      min-height: 88vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 3rem 2rem 5rem;
      overflow: hidden;
    }

    .hero-eyebrow {
      font-size: 0.62rem;
      letter-spacing: 0.26em;
      text-transform: uppercase;
      color: var(--rose);
      margin-bottom: 1.25rem;
      font-weight: 400;
    }

    .hero-title {
      font-family: 'Manufacturing Consent', serif;
      font-weight: 400;
      font-size: clamp(3.5rem, 11vw, 8rem);
      line-height: 0.95;
      color: var(--bone);
      margin-bottom: 1.5rem;
      letter-spacing: 0.01em;
    }

    .hero-sub {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: clamp(1rem, 2.2vw, 1.25rem);
      color: var(--bone-dim);
      margin-bottom: 2.5rem;
      font-weight: 300;
      max-width: 380px;
    }

    .hero-divider {
      width: 1px;
      height: 48px;
      background: linear-gradient(to bottom, transparent, rgba(139,58,74,0.6), transparent);
      margin: 0 auto 2.5rem;
    }

    .hero-actions { display: flex; gap: 0.75rem; flex-wrap: wrap; justify-content: center; }

    .hero-drip {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      pointer-events: none;
    }

    /* GALLERY */
    #gallery {
      position: relative;
      z-index: 1;
      padding: 4rem 2rem;
      background: var(--off-black);
      border-top: 0.5px solid rgba(232,227,218,0.06);
    }

    .gallery-header { text-align: center; margin-bottom: 2.5rem; }

    .gallery-header h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.75rem, 4vw, 2.5rem);
      font-weight: 300;
      color: var(--bone);
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 2px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .gallery-item {
      aspect-ratio: 1;
      overflow: hidden;
      background: var(--ink);
      position: relative;
    }

    .gallery-item img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
      transition: transform 0.5s ease, filter 0.4s ease;
      filter: saturate(0.8);
    }

    .gallery-item:hover img { transform: scale(1.04); filter: saturate(1); }

    .gallery-item .overlay {
      position: absolute; inset: 0;
      background: rgba(10,10,10,0);
      transition: background 0.3s;
    }
    .gallery-item:hover .overlay { background: rgba(10,10,10,0.1); }

    .gallery-empty {
      grid-column: 1/-1;
      text-align: center;
      padding: 5rem 2rem;
      color: var(--silver);
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 1.15rem;
    }

    @media (max-width: 640px) {
      #gallery { padding: 3rem 1rem; }
      .gallery-grid { grid-template-columns: repeat(2, 1fr); gap: 2px; }
      .hero { min-height: 80vh; padding: 2rem 1.5rem 4rem; }
    }
  </style>
</head>

  <script type="module">
    import { initializeApp }    from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js';
    import { getFirestore, collection, getDocs, orderBy, query }
                                from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js';
    import { FIREBASE_CONFIG }  from './firebase-config.js';

    const observer = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
    }, { threshold: 0.1 });
    document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));

    const app = initializeApp(FIREBASE_CONFIG);
    const db  = getFirestore(app);

    async function loadGallery() {
      const grid = document.getElementById('gallery-grid');
      try {
        const q    = query(collection(db, 'gallery'), orderBy('uploadedAt', 'desc'));
        const snap = await getDocs(q);
        if (snap.empty) {
          grid.innerHTML = '<div class="gallery-empty">✦ &nbsp; Coming soon — check back soon. &nbsp; ✦</div>';
          return;
        }
        grid.innerHTML = snap.docs.map(doc => {
          const { url, caption } = doc.data();
          return `<div class="gallery-item fade-in">
            <img src="${url}" alt="${caption || 'Nail art by Kait'}" loading="lazy" />
            <div class="overlay"></div>
          </div>`;
        }).join('');
        document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));
      } catch (err) {
        grid.innerHTML = '<div class="gallery-empty">✦ &nbsp; Gallery unavailable — check back soon. &nbsp; ✦</div>';
      }
    }
    loadGallery();
  </script>
  <script>
    const toggle = document.getElementById('nav-toggle');
    const nav    = document.querySelector('nav');
    if (toggle) {
      toggle.addEventListener('click', () => {
        toggle.classList.toggle('open');
        nav.classList.toggle('open');
      });
      // close on nav link click
      nav.querySelectorAll('a').forEach(a => {
        a.addEventListener('click', () => {
          toggle.classList.remove('open');
          nav.classList.remove('open');
        });
      });
    }
  </script>
